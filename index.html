  home:      'CONVOY 1943 — Atlantic Naval Warfare',
  about:     'About — CONVOY 1943',
  play:      'How to Play — CONVOY 1943',
  players:   'Players — CONVOY 1943',
  allies:    'Allied Vessels — CONVOY 1943',
  axis:      'Axis Vessels — CONVOY 1943',
  systems:   'Systems &amp; Weapons — CONVOY 1943',
  downloads: 'Downloads — CONVOY 1943',
  tools:     'Modding Tools — CONVOY 1943',
};

function navigateTo(page, pushState = true) {
  if (!pages[page]) page = 'home';
  if (page === currentPage) return;

  // Fade out
  pageContent.classList.add('transitioning');

  setTimeout(() => {
    // Inject content
    pageContent.innerHTML = pages[page];
    currentPage = page;

    // Update URL hash
    if (pushState) {
      history.pushState({ page }, '', '#' + page);
    }

    // Update nav active state
    document.querySelectorAll('.nav-links a').forEach(a => {
      a.classList.toggle('active', a.dataset.page === page);
    });

    // Bind data-page links inside the new content
    pageContent.querySelectorAll('[data-page]').forEach(el => {
      el.addEventListener('click', e => {
        e.preventDefault();
        navigateTo(el.dataset.page);
      });
    });

    // Scroll to top
    window.scrollTo({ top: 0 });

    // Fade in
    pageContent.classList.remove('transitioning');

    // Init scroll reveal
    const reveals = pageContent.querySelectorAll('.reveal');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });
    reveals.forEach(el => observer.observe(el));

    // Nav background: always show on non-home pages
    navbar.classList.toggle('scrolled', page !== 'home' || window.scrollY > 80);

    // Page title
    document.title = pageTitles[page] || 'CONVOY 1943';

  }, currentPage === null ? 0 : 280);
}

// ═══════ NAV SCROLL STATE ═══════
window.addEventListener('scroll', () => {
  if (currentPage === 'home') {
    navbar.classList.toggle('scrolled', window.scrollY > 80);
  }
});

// ═══════ BACK / FORWARD ═══════
window.addEventListener('popstate', e => {
  const page = e.state?.page || getPageFromHash();
  navigateTo(page, false);
});

function getPageFromHash() {
  const hash = window.location.hash.replace('#', '');
  return pages[hash] ? hash : 'home';
}

// ═══════ BIND STATIC NAV ═══════
document.querySelectorAll('[data-page]').forEach(el => {
  el.addEventListener('click', e => {
    e.preventDefault();
    navigateTo(el.dataset.page);
  });
});

// ═══════ INIT ═══════
navigateTo(getPageFromHash(), false);
</script>
</body>
</html>
