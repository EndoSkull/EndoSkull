<div class="section-divider"></div>
<section id="commands" class="section">
  <div class="section-inner">
    <div class="section-label reveal">Operations Manual</div>
    <h2 class="section-title reveal reveal-delay-1">ADDON <span class="accent">COMMANDS</span></h2>
    <p class="section-body reveal reveal-delay-2">Current player-facing and operator-facing chat commands for the live addon. Type these directly into the Stormworks chat during a session. Command details were verified against <code>addon_ConvoySurvival/script.lua</code>, <code>INTERFACE.md</code>, and the Python simulation contract on <time datetime="2026-07-22"><b>22 July 2026</b></time>. Commands marked <span class="cmd-tag cmd-tag--admin">ADMIN</span> are restricted to server operators; one-off internal test hooks are intentionally omitted.</p>

    <div class="cmd-table reveal reveal-delay-1">

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?add [formation_id] [type]</code></div>
        <div class="cmd-cell cmd-cell--desc">Add a ship of the given type to an existing formation by its ID.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?aim</code></div>
        <div class="cmd-cell cmd-cell--desc">Plots a firing solution for the nearest vehicle and displays it on your screen.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--nav">NAV</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?aims</code></div>
        <div class="cmd-cell cmd-cell--desc">Extended aim plot - same as <code>?aim</code> but includes spread/arc data for salvo targeting.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--nav">NAV</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?air [even_total]</code></div>
        <div class="cmd-cell cmd-cell--desc">Shows or sets the persisted total active AI-aircraft limit for the strategic layer. The value must be even so the allowance splits equally between Allied and Axis AI aircraft; player aircraft do not count.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?aircount</code></div>
        <div class="cmd-cell cmd-cell--desc">Lists every living addon-controlled AI plane, grouped by team and aircraft type, and reports the total currently alive.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?ambush [point_id]</code><br><code>?ambush [point_id] [type]</code></div>
        <div class="cmd-cell cmd-cell--desc">Teleports your current ship to the specified ambush point (shown as orange flame markers on the map). If a vehicle type is also provided, spawns a new vessel of that type at the point and puts you in command of it. e.g. <code>?ambush 623 Type-IIA</code></div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--axis">AXIS</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?bail</code></div>
        <div class="cmd-cell cmd-cell--desc">Orders the crew of the nearest vehicle to abandon ship immediately.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?board</code></div>
        <div class="cmd-cell cmd-cell--desc">Boards the nearest ship (within 500m) as your new home ship and switches you to its crew radio channel.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--general">GENERAL</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?bubbles</code></div>
        <div class="cmd-cell cmd-cell--desc">Toggles the floating status bubble popups that appear above vehicles on screen.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?bulk [formation_id] [amount]</code></div>
        <div class="cmd-cell cmd-cell--desc">Adds the specified number of cargo ships to an existing formation in bulk.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?campaign new [date] confirm</code><br><code>?campaign end confirm</code><br><code>?campaign status</code></div>
        <div class="cmd-cell cmd-cell--desc">Campaign lifecycle: start the next campaign (resets campaign stats, keeps lifetime), end and snapshot the current one, or show status.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?carrier [plane] [dc|torp]</code><br><code>?carrier launchall [n] [plane] [dc|torp]</code><br><code>?carrier landall</code><br><code>?carrier cancel</code><br><code>?carrier sched</code></div>
        <div class="cmd-cell cmd-cell--desc">Directs the nearest aircraft carrier. It turns into the wind, then launches a plane (optional <code>dc</code>/<code>torp</code> loadout), launches a flight of <code>n</code> with <code>launchall</code>, or recovers its eligible AI planes one at a time with <code>landall</code>. <code>cancel</code> aborts the current flight operation and sends the ship back to the convoy; <code>sched</code> prints the live dawn/dusk scheduler state, onboard air-wing count and busy phase. Seaplanes are refused: carrier modes 11 and 12 are both disabled for them.</div>

      <div class="cmd-row">

      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?clear</code><br><code>?clear all</code></div>
        <div class="cmd-cell cmd-cell--desc">Resets route reserves to zero and removes active formations. Adding <code>all</code> also hard-despawns registered addon vehicles, lifeboats and survivor characters. <b>It is not a full addon reset:</b> it does not rebuild <code>g_savedata</code> or clear campaign, configuration, route, player or virtual-world state.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?crew</code><br><code>?crew sections</code></div>
        <div class="cmd-cell cmd-cell--desc">Reports crew totals, casualties, morale, fatigue, reserves, and major system efficiencies for the registered vessel you are aboard or standing near. Add <code>sections</code> for compartment damage, fire, flooding, and casualty details.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--general">GENERAL</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?convoy [slots]</code></div>
        <div class="cmd-cell cmd-cell--desc">Shows or sets the persisted maximum active convoy cargo/carrier slots in the strategic layer. One carrier consumes one slot, and changes apply on the next convoy materialization.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?cm</code></div>
        <div class="cmd-cell cmd-cell--desc">Spawns a countermeasure at your current position.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--combat">COMBAT</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?commandeer</code></div>
        <div class="cmd-cell cmd-cell--desc">Removes the AI captain from the nearest vehicle, leaving it under player control.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?control [type]</code><br><code>?control [type] [escorts]</code></div>
        <div class="cmd-cell cmd-cell--desc">Spawns a vessel of the given type at your position and assigns you as its commander. Optionally spawns a number of AI escort vessels alongside it. e.g. <code>?control Flower 2</code></div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?crif [recipient 1-4] [message id]</code></div>
        <div class="cmd-cell cmd-cell--desc">Sends a CRIF radio message from the Radio Operator seat - a manual fallback for the Send button. Recipients: 1 Friendly &middot; 2 Enemy &middot; 3 Convoy &middot; 4 AI Support. e.g. <code>?crif 4 21</code> calls an AI Hunt.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--combat">COMBAT</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?damage</code></div>
        <div class="cmd-cell cmd-cell--desc">Applies random structural damage to the nearest aircraft (detaches a wing or tail).</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?date YYYY-MM-DD</code></div>
        <div class="cmd-cell cmd-cell--desc">Requests a new authoritative campaign date from the Radio PC backend. The addon validates the format locally, then waits for backend confirmation.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?debug</code></div>
        <div class="cmd-cell cmd-cell--desc">Toggles server-side debug logging output.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?deckinfo</code></div>
        <div class="cmd-cell cmd-cell--desc">Reports the nearest carrier's deck length, heading and stern/bow deck height - used to check the deck markers are placed correctly.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?decoy</code><br><code>?decoy [bold|sieglinde|siegmund]</code></div>
        <div class="cmd-cell cmd-cell--desc">(U-boat) Releases an acoustic decoy to break an ASDIC lock. Defaults to Bold; Sieglinde and Siegmund are mobile decoy variants.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--axis">AXIS</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?empty [type]</code></div>
        <div class="cmd-cell cmd-cell--desc">Spawns an uncrewed vessel of the given type at your position with no AI assigned.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?escort [type]</code></div>
        <div class="cmd-cell cmd-cell--desc">Spawns an escort (destroyer or corvette) directly onto the nearest convoy's next free screen station.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--general">GENERAL</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?escorts [count]</code></div>
        <div class="cmd-cell cmd-cell--desc">Shows or sets the baseline AI escort allowance for the active convoy layer. The first player escort keeps the full baseline; each additional player escort replaces one AI escort, and live active-convoy escort screens reconcile immediately.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?event on</code>&nbsp;&middot;&nbsp;<code>?event off</code><br><code>?event rtb confirm</code></div>
        <div class="cmd-cell cmd-cell--desc">Toggles combat stat recording during a campaign. <code>rtb</code> force-banks pending stats for every boat still at sea.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?flare</code></div>
        <div class="cmd-cell cmd-cell--desc">Launches a green signal flare from your position at altitude.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--combat">COMBAT</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?go [x] [y]</code></div>
        <div class="cmd-cell cmd-cell--desc">Fast-travels your ship and all crew aboard to the specified world coordinates. Must be in a vehicle. e.g. <code>?go 5000 -3400</code></div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--nav">NAV</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?gunners</code></div>
        <div class="cmd-cell cmd-cell--desc">Refreshes and reassigns the AI gunner crew positions on the nearest vehicle.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?id</code><br><code>?id [allies|axis]</code></div>
        <div class="cmd-cell cmd-cell--desc">Prints the IDs and types of every live addon vehicle, optionally filtered to one team. Useful when another command needs a numeric vehicle ID.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?join allies</code><br><code>?join axis</code></div>
        <div class="cmd-cell cmd-cell--desc">Enlists you into the Allied or Axis team. Required before you can spawn or board a vessel.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--general">GENERAL</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?jumpconvoy</code></div>
        <div class="cmd-cell cmd-cell--desc">Teleports you, or your nearby owned/player ship, to the active virtual convoy's flagship position. Falls back to the nearest virtual convoy if none is active.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span> <span class="cmd-tag cmd-tag--nav">NAV</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?killbelow [depth]</code></div>
        <div class="cmd-cell cmd-cell--desc">Despawns all vehicles currently below the specified depth in metres. e.g. <code>?killbelow 15</code> removes everything below -15m.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?land</code></div>
        <div class="cmd-cell cmd-cell--desc">In an eligible non-seaplane aircraft, requests recovery from the nearest carrier. It turns into the wind and recovers you as you fly the approach from astern. Seaplanes are refused because mode 12 is disabled for them.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--combat">COMBAT</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?leave</code></div>
        <div class="cmd-cell cmd-cell--desc">Leaves your current team and returns to the team selection screen.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--general">GENERAL</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?m &lt;keyword|morse&gt;</code><br><code>?m pos</code><br><code>?m orders</code></div>
        <div class="cmd-cell cmd-cell--desc">Transmits through the live Morse net from an equipped vessel. Use <code>?m</code> alone for the accepted keywords. <code>pos</code> reports position; Axis radio operators can request a directed B.d.U. assignment with <code>orders</code>, subject to a ten-minute sender cooldown. <code>?m sos</code> also alerts nearby AI U-boats.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--general">GENERAL</span> <span class="cmd-tag cmd-tag--axis">AXIS</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?msgs</code><br><code>?mprev</code> &middot; <code>?mnext</code></div>
        <div class="cmd-cell cmd-cell--desc">Opens the current vessel's decoded Morse log and moves backward or forward through stored messages.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--general">GENERAL</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?mhelp</code> &middot; <code>?mkeys</code><br><code>?morse_toggle</code><br><code>?mveh</code></div>
        <div class="cmd-cell cmd-cell--desc">Shows Morse command help, toggles Morse processing for your player, or lists registered receiver vehicles and their tuned channels.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--general">GENERAL</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?maneuver</code></div>
        <div class="cmd-cell cmd-cell--desc">Generates an ambush maneuver waypoint for your current position and heading.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--axis">AXIS</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?name [id] [name]</code></div>
        <div class="cmd-cell cmd-cell--desc">Renames a vehicle by its ID. The new name appears on map markers and nearby ship popups. e.g. <code>?name 42 HMS Gladiator</code></div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?planedbg</code><br><code>?planedbg on|off|stat|roster</code></div>
        <div class="cmd-cell cmd-cell--desc">Bare command toggles all-plane debug recording. <code>on</code>/<code>off</code> are idempotent, <code>stat</code> diagnoses the logger connection and recorded-frame count, and <code>roster</code> lists every eligible AI plane and simulation state.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?preset [name]</code></div>
        <div class="cmd-cell cmd-cell--desc">Selects a spawn preset for formation spawning. Type <code>?preset</code> alone to list all available presets.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?rank admin</code><br><code>?rank reset</code></div>
        <div class="cmd-cell cmd-cell--desc">Testing override: unlocks all six personal branch tiers and sets Allied, Axis, and Casual RP wallets to 10,000. <code>reset</code> removes the tier override without taking RP away.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?rp</code><br><code>?rp add [allies|axis|casual] [amount]</code><br><code>?rp set [allies|axis|casual] [amount]</code></div>
        <div class="cmd-cell cmd-cell--desc">Shows Allied and Axis event RP plus shared non-event Casual RP. Server operators can add to or set any wallet.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--general">GENERAL</span> <span class="cmd-tag cmd-tag--admin">ADMIN</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?recover</code></div>
        <div class="cmd-cell cmd-cell--desc">Forces the nearest carrier to recover the nearest eligible non-seaplane - tests the full into-wind, approach and recovery cycle.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?repair</code></div>
        <div class="cmd-cell cmd-cell--desc">Calls a repair ship to the nearest damaged vessel. Stop and stay surfaced when she comes alongside.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--general">GENERAL</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?reset</code></div>
        <div class="cmd-cell cmd-cell--desc">Resets the physics and vehicle state of the nearest vehicle without despawning it.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?resetstats confirm</code></div>
        <div class="cmd-cell cmd-cell--desc">Starts a fresh campaign, zeroing campaign and banked stats for all players (lifetime stats and playtime are kept).</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?resupply</code></div>
        <div class="cmd-cell cmd-cell--desc">Requests a supply vessel for the nearest ship. A resupply ship will spawn and sail to your location. Only one resupply can be active at a time per vessel.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--general">GENERAL</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?scout [sector]</code><br><code>?scout [sector] manual</code></div>
        <div class="cmd-cell cmd-cell--desc">Dispatches a reconnaissance aircraft to survey the named map sector. Add <code>manual</code> to take direct control of the scout plane. Subject to a cooldown timer between uses.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--general">GENERAL</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?scuttle</code></div>
        <div class="cmd-cell cmd-cell--desc">Immediately despawns the nearest vehicle - use to scuttle a damaged or stranded vessel.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--general">GENERAL</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?simauthority surface|all|off|status</code></div>
        <div class="cmd-cell cmd-cell--desc">Controls the Python strategic-authority handoff. <code>surface</code> covers abstract convoys and battle groups, <code>all</code> also covers virtual aircraft and submarines, <code>off</code> freezes the abstract layer, and <code>status</code> reports health and the effective state. Authority only arms from a healthy, synchronized snapshot.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span> <span class="cmd-tag cmd-tag--dev">DEV</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?simcompare</code></div>
        <div class="cmd-cell cmd-cell--desc">Compares the Lua strategic snapshot with the cached Python mirror, reporting missing or stale entities, position drift, and state/route mismatches. Requires a connected, fully synchronized mirror.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span> <span class="cmd-tag cmd-tag--dev">DEV</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?simresync</code></div>
        <div class="cmd-cell cmd-cell--desc">Queues a fresh full strategic snapshot for the Python simulation transport. Use when the mirror is not ready or a safe authority handoff needs a clean resynchronization.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span> <span class="cmd-tag cmd-tag--dev">DEV</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?simstatus</code></div>
        <div class="cmd-cell cmd-cell--desc">Reports Python transport connection, protocol, authority, world/revision, entity and command counts, snapshot/reconcile progress, queue depth, reply age, failures, and any current warning.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span> <span class="cmd-tag cmd-tag--dev">DEV</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?simulate [1-1000] convoys|air|subs|battlegroups</code><br><code>?simulate status</code><br><code>?simulate clear</code></div>
        <div class="cmd-cell cmd-cell--desc">Strategic-layer test harness. Creates virtual-only test convoys, aircraft, submarines or battle groups from the current dated route and patrol sources, reports the current test-unit counts, or clears previously injected virtual test units.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span> <span class="cmd-tag cmd-tag--dev">DEV</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?simulation on</code><br><code>?simulation off</code><br><code>?simulation status</code></div>
        <div class="cmd-cell cmd-cell--desc">Controls the strategic simulation layer itself. <code>off</code> freezes virtual convoy, battle-group, aircraft and U-boat traffic in place without removing player or manually spawned vehicles; <code>on</code> resumes them from those frozen positions; <code>status</code> reports the current live and virtual counts plus active limits.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span> <span class="cmd-tag cmd-tag--dev">DEV</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?spawn [type] [additional_count]</code><br><code>?spawn ai_avenger [additional_count] [torp|dc]</code><br><code>?spawn ai_catalina|ai_sunderland [additional_count] water</code></div>
        <div class="cmd-cell cmd-cell--desc">Spawns one persistent lead vehicle at your position; a number adds that many formation members (so <code>2</code> means three aircraft total). A canonical <code>ai_*</code> request is always addon AI, even when it matches your team. Every directly spawned AI plane keeps its own exact post-offset spawn XY as its patrol and RTB anchor. While simulated, each reports once per second as <code>ID: ... Throttle: ... &amp; XY Nav Target: ... &amp; Mode: ... Ai: true</code>. Avenger accepts <code>torp</code> or <code>dc</code>. <code>water</code> is seaplane-only, may appear before or after the count, spawns at sea level, and immediately begins the mode-1 water-takeoff run. Examples: <code>?spawn ai_spitfire</code>, <code>?spawn ai_avenger 2 dc</code>, <code>?spawn ai_catalina water</code>.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?start</code></div>
        <div class="cmd-cell cmd-cell--desc">Teleports you to the team-select spawn point to choose a side.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--general">GENERAL</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?switch</code></div>
        <div class="cmd-cell cmd-cell--desc">Flips the nearest vehicle to the opposing team.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?uboats [count]</code></div>
        <div class="cmd-cell cmd-cell--desc">Shows or sets the persisted maximum active AI U-boat allowance for the strategic layer. Player submarines do not consume this limit.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?sync</code></div>
        <div class="cmd-cell cmd-cell--desc">Re-syncs every player's Discord radio channel with the Commodore bot.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--general">GENERAL</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?telemetry</code><br><code>?telemetry on|off</code></div>
        <div class="cmd-cell cmd-cell--desc">Toggles the addon's one-way debug telemetry firehose. State persists in <code>g_savedata</code>; use it only when capturing external telemetry.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?torp</code><br><code>?torp a</code>&nbsp;&middot;&nbsp;<code>?torp p</code>&nbsp;&middot;&nbsp;<code>?torp d</code></div>
        <div class="cmd-cell cmd-cell--desc">Fires a torpedo in the direction you are looking. Default fires a basic torpedo. Variants: <code>a</code> = advanced, <code>p</code> = programmable, <code>d</code> = dumb (straight runner).</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--combat">COMBAT</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?tp</code><br><code>?tp [vehicle_id]</code><br><code>?tp [vehicle_name]</code><br><code>?tp base</code></div>
        <div class="cmd-cell cmd-cell--desc">Teleports you to a vehicle by ID or name (must be on your team), or to your team's home base. Used without arguments, returns you to your last assigned ship.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--nav">NAV</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?travel [x] [y]</code></div>
        <div class="cmd-cell cmd-cell--desc">Generates a fast-travel waypoint to the specified coordinates for your current vessel.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--nav">NAV</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?uboatstatus</code></div>
        <div class="cmd-cell cmd-cell--desc">Roll call - every living AI U-boats acknowledge by morse on the U-boat net so you can count how many are still at sea.</div>
        <div class="cmd-cell cmd-cell--tags"><span class="cmd-tag cmd-tag--admin">ADMIN</span></div>
      </div>

      <div class="cmd-row">
        <div class="cmd-cell cmd-cell--syntax"><code>?vc</code></div>

      <div class="dev-block reveal">

        <p class="dev-sub">Verified on <b>19 July 2026</b> against <code>script.lua</code>, <code>tests/python_sim_transport.test.js</code>, and <code>tests/python_sim_authority.test.js</code>. The Python service is authoritative for abstract strategic entities after a complete, healthy snapshot; Lua remains authoritative for physical Stormworks spawning and vehicle execution. The handoff is fail-closed: disconnects, stale or rejected synchronization, and unsafe cached positions suspend effective authority and require a safe snapshot before it can resume. Operators can inspect transport state with <code>?simstatus</code>, select <code>surface</code> or <code>all</code> authority with <code>?simauthority</code>, audit mirror drift with <code>?simcompare</code>, and queue a fresh snapshot with <code>?simresync</code>.</p>

      <div class="dev-block reveal">

        <p class="dev-sub">Verified on <b>20 July 2026</b> against <code>script.lua</code>, <code>INTERFACE.md</code>, and the Python crew/damage implementation. Lua reports bounded Stormworks facts and applies explicitly queued repair pulses only to loaded, simulating vehicles. Python owns the virtual crew ledger, section or airframe inference, casualties, morale, fatigue, system efficiencies, flooding risk, damage-control priorities, and repair timing. Reconciliation is byte-bounded, and damaged loaded vessels retain their current ledger when the registry catalog changes. The optional <code>crew_status</code> keypad is the sole addon-to-display data link; vehicles without it simply ignore the write.</p>

      <div class="dev-block reveal">

        <p class="dev-sub">The hot-reloaded Physical Asset Registry maps exact installed Stormworks mission components to faction, role, route scope, priority, and global active caps. Route and patrol composition slots select registry IDs; player-only assets remain available to crew and damage profiles but are excluded from automatic strategic spawning. Python authors a cap-aware spawn plan, while Lua revalidates eligibility and capacity immediately before using Stormworks APIs. Every Python-triggered convoy, surface group, aircraft, submarine, or reinforcement shares one staged lane: each vehicle must become simulating and settle before the next is created, and a timeout rejects and rolls back a partial formation.</p>

      <div class="dev-block reveal">

          <table class="dev-table">
            <thead><tr><th>Code</th><th>Target</th><th>Attack profile the MC flies</th></tr></thead>
            <tbody>
              <tr><td><span class="dev-mode n">0</span></td><td>None / hold</td><td>Guns cold, no firing solution — ignore the target track and fly pure nav on <code>air_mode</code>.</td></tr>
              <tr><td><span class="dev-mode n">1</span></td><td>Aircraft</td><td>Air-to-air — lead the gun solution and dogfight.</td></tr>
              <tr><td><span class="dev-mode n">2</span></td><td>Merchant or submarine</td><td>Soft surface contact — run in <b>low</b> for the torpedo / depth-charge drop.</td></tr>
              <tr><td><span class="dev-mode n">3</span></td><td>Warship with AA</td><td>Defended target — strafe from <b>altitude</b>, never descend into the flak.</td></tr>
            </tbody>
          </table>
        </div>
        <div class="dev-notes">
          <div class="dev-note"><span class="k">How the addon picks it</span><p>Each tick the addon classifies the current target from what it already tracks: above ~20 m altitude &rarr; <b>1</b> (aircraft); a merchant, tanker, submarine or auxiliary &rarr; <b>2</b>; anything else — a defended warship &rarr; <b>3</b>. That code goes out on <code>air_tgt_valid</code> together with the target's position and velocity on the other target keypads.</p></div>
          <div class="dev-note"><span class="k">What the MC does with it</span><p>The MC gates on <code>&gt; 0.5</code>. At <b>0</b> it ignores the target track completely and just flies the commanded <code>air_mode</code>; at <b>1 / 2 / 3</b> it builds the lead solution from <code>air_tgt_w*</code> / <code>air_tgt_v*</code> and shapes the run to the class above. Reading it as a plain &gt;0.5 flag keeps a simple MC working — any non-zero just means "target present".</p></div>
          <div class="dev-note"><span class="k">It is not a trigger</span><p>A valid target is <b>not</b> permission to fire. <code>air_tgt_valid</code> says a target exists and what it is; <code>air_fire_auth</code> is the separate trigger. On a torpedo run the addon holds <code>air_tgt_valid = 2</code> the whole way in while keeping <code>air_fire_auth = 0</code>, and only drops the fish once the plane is genuinely low and lined up.</p></div>
          <div class="dev-note"><span class="k">Reset on a target switch</span><p>When the plane changes targets the addon forces <code>air_tgt_valid</code> to 0 for ~15 ticks <b>before</b> the new one appears. That makes the MC's ordnance-release latch and re-attack timers reset cleanly on the old target, so a stale solution can never carry over onto the new one.</p></div>
        </div>
      </div>

      <div class="dev-block reveal">
        <h3 class="dev-heading"><span class="num">06</span>WIRING &amp; GOTCHAS</h3>
        <div class="dev-notes">
          <div class="dev-note"><span class="k">Canonical names</span><p>Mission components and commands use <code>ai_[aircraft]</code>: <code>ai_spitfire</code>, <code>ai_bf110</code>, <code>ai_he111</code>, <code>ai_avenger</code>, <code>ai_catalina</code> and <code>ai_sunderland</code>. The mission class tag decides that the component is an aircraft. An unrecognised or untagged <code>ai_*</code> name remains inert.</p></div>
          <div class="dev-note"><span class="k">Class = tag</span><p>The class (bomber / fighter / …) comes from the mission <b>tag</b>; register it in the catalog + the bomber-family predicate to make a new type spawn &amp; fly correctly.</p></div>
          <div class="dev-note"><span class="k">MC · carrier modes</span><p>The addon enables 11/12 only for eligible non-seaplanes. Avenger and He-111 are currently eligible. For every seaplane, <b>mode 11=false and mode 12=false</b>; launch/recovery commands refuse them and stale carrier flags from older saves are cleared.</p></div>
          <div class="dev-note"><span class="k">Fighterbomber</span><p>Ground/surface attack is primary. The Bf-110 switches to the air attacker only while a close rear-hemisphere threat is set, then returns to its mode-1/mode-2 strike cycle. The current addon supplies no generic bomb payload.</p></div>
          <div class="dev-note"><span class="k">Direct-spawn RTB</span><p>Every plane created by <code>?spawn ai_*</code> uses mode 1 to return to its own exact post-offset spawn XY and resumes patrol there; it will not switch home to a nearby ship. This is not a landing or despawn. A seaplane <code>water</code> spawn is a takeoff test, and carrier modes 11/12 remain disabled.</p></div>
        </div>
      </div>

    </div>
  </div>
</section>`

}; // end pages

// ═══════ LIVE STREAMS ═══════
// live.json is refreshed every ~10 min by .github/workflows/youtube-live.yml.
// If it is missing or malformed we leave the fallback iframe that ships in the
// markup, so the hero always has something playing.
const VIDEO_ID_RE = /^[\w-]{11}$/;
let livePromise = null;

function fetchLiveStatus() {
  if (!livePromise) {
    livePromise = fetch('live.json', { cache: 'no-store' })
      .then(r => (r.ok ? r.json() : null))
      .catch(() => null);
  }
  return livePromise;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => (
    { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
  ));
}

function streamCard(videoId, name, handle, isLive) {
  const src = `https://www.youtube.com/embed/${videoId}`;
  const label = isLive
    ? `<span class="live-dot"></span>LIVE`
    : 'Latest Stream';
  const link = handle
    ? `<a class="live-card-link" href="https://www.youtube.com/@${encodeURIComponent(handle)}/streams" target="_blank" rel="noopener">${escapeHtml(name)}</a>`
    : escapeHtml(name);
  return `
    <div class="live-card">
      <div class="live-card-frame">
        <iframe src="${src}" title="${escapeHtml(name)}" frameborder="0"
          allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
      </div>
      <div class="live-card-meta">
        <span class="live-badge${isLive ? ' is-live' : ''}">${label}</span>
        ${link}
      </div>
    </div>`;
}

async function renderLiveHero() {
  const host = document.getElementById('live-hero');
  if (!host) return;

  const data = await fetchLiveStatus();
  if (!data) return; // keep the markup fallback

  const live = (Array.isArray(data.live) ? data.live : [])
    .filter(s => VIDEO_ID_RE.test(s.videoId || ''));

  // Re-check: the router may have navigated away while we were fetching.
  if (!document.getElementById('live-hero')) return;

  if (live.length) {
    host.classList.add('live-host');
    host.classList.toggle('live-grid-multi', live.length > 1);
    host.innerHTML = live.map(s => streamCard(s.videoId, s.name, s.handle, true)).join('');
    return;
  }

  const fallbackId = (data.fallback && data.fallback.videoId) || host.dataset.fallback;
  if (!VIDEO_ID_RE.test(fallbackId || '')) return;
  host.classList.add('live-host');
  host.classList.remove('live-grid-multi');
  host.innerHTML = streamCard(
    fallbackId,
    (data.fallback && data.fallback.name) || 'Convoy 1943',
    data.fallback && data.fallback.handle,
    false
  );
}

// ═══════ ROUTER ═══════
const pageContent = document.getElementById('page-content');
const navbar = document.getElementById('navbar');
let currentPage = null;

const pageTitles = {
  home:      'CONVOY 1943 — Atlantic Naval Warfare',
  about:     'About — CONVOY 1943',
  play:      'How to Play — CONVOY 1943',
  players:   'Players — CONVOY 1943',
  allies:    'Allied Vessels — CONVOY 1943',
  axis:      'Axis Vessels — CONVOY 1943',
  systems:   'Systems &amp; Weapons — CONVOY 1943',
  commands:  'Commands — CONVOY 1943',
  updates:   'Updates — CONVOY 1943',
  fotch:     'Friends of the Channel — CONVOY 1943',
  downloads: 'Downloads — CONVOY 1943',
  tools:     'Modding Tools — CONVOY 1943',
  dev:       'Dev — CONVOY 1943',
};

function navigateTo(page, pushState = true) {
  if (!pages[page]) page = 'home';
  if (page === currentPage) return;

  // Fade out
  pageContent.classList.add('transitioning');

  setTimeout(() => {
    // Inject content
    pageContent.innerHTML = pages[page];
    currentPage = page;

    // Update URL hash
    if (pushState) {
      history.pushState({ page }, '', '#' + page);
    }

    // Update nav active state
    document.querySelectorAll('.nav-links a').forEach(a => {
      a.classList.toggle('active', a.dataset.page === page);
    });

    // (data-page links handled by document-level delegation below)

    // Scroll to top
    window.scrollTo({ top: 0 });

    // Fade in
    pageContent.classList.remove('transitioning');

    // Init scroll reveal
    const reveals = pageContent.querySelectorAll('.reveal');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });
    reveals.forEach(el => observer.observe(el));

    // Nav background: always show on non-home pages
    navbar.classList.toggle('scrolled', page !== 'home' || window.scrollY > 80);

    // Page title
    document.title = pageTitles[page] || 'CONVOY 1943';

    // Swap the hero video for whoever is streaming right now
    if (page === 'home') renderLiveHero();

  }, currentPage === null ? 0 : 280);
}

// ═══════ NAV SCROLL STATE ═══════
window.addEventListener('scroll', () => {
  if (currentPage === 'home') {
    navbar.classList.toggle('scrolled', window.scrollY > 80);
  }
});

// ═══════ BACK / FORWARD ═══════
window.addEventListener('popstate', e => {
  const page = e.state?.page || getPageFromHash();
  navigateTo(page, false);
});

function getPageFromHash() {
  const hash = window.location.hash.replace('#', '');
  return pages[hash] ? hash : 'home';
}

// ═══════ BIND ALL DATA-PAGE LINKS (delegated) ═══════
document.addEventListener('click', e => {
  const el = e.target.closest('[data-page]');
  if (!el) return;
  e.preventDefault();
  navigateTo(el.dataset.page);
});

// ═══════ INIT ═══════
navigateTo(getPageFromHash(), false);
</script>
</body>
</html>
